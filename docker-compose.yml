services:
  # Proxy principal configurado para Balanceo de carga
  proxy_asix_lautaro:
    image: nginx:alpine
    container_name: proxy_asix_lautaro
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web_lautaro_1:
        condition: service_healthy
      web_lautaro_2:
        condition: service_healthy
    networks:
      - Red_Lautaro
    restart: unless-stopped

  # Backend Web 1
  web_lautaro_1:
    image: httpd:alpine
    container_name: web_lautaro_1
    volumes:
      - ./web-content:/usr/local/apache2/htdocs
    networks:
      - Red_Lautaro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Backend Web 2
  web_lautaro_2:
    image: httpd:alpine
    container_name: web_lautaro_2
    volumes:
      - ./web-content:/usr/local/apache2/htdocs
    networks:
      - Red_Lautaro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  Red_Lautaro:
    driver: bridge
    name: Red_Lautaro_ASIX
